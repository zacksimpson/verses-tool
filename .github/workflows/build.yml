name: Android App APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "esvApiKey=${{ secrets.ESV_API_KEY }}" >> local.properties
          echo "gpr.user=${{ secrets.GH_PACKAGES_USER }}" >> local.properties
          echo "gpr.key=${{ secrets.GH_PACKAGES_TOKEN }}" >> local.properties

      - name: Get app info
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "APP_NAME=verses" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew :verses:assembleRelease

      - name: Rename APK
        run: |
          mkdir -p release
          cp verses/build/outputs/apk/release/verses-release.apk "release/${APP_NAME}_${VERSION}.apk"

      - name: Generate changelog
        run: |
          CURRENT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -n "$CURRENT_TAG" ]; then
            PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          else
            PREVIOUS_TAG=$(git tag --sort=-creatordate | head -1)
          fi
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.APP_NAME }}_${{ env.VERSION }}.apk
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          make_latest: ${{ !contains(github.ref_name, '-beta') }}
          body: |
            ## What's Changed
            ${{ env.CHANGELOG }}
